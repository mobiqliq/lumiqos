services:
  lumiqos_db:
    container_name: lumiqos_db
    image: postgres:15-alpine
    environment: [POSTGRES_USER=postgres, POSTGRES_PASSWORD=postgres, POSTGRES_DB=lumiq]
    networks: [lumiqos-network]

  api-gateway:
    container_name: api-gateway
    build: { context: ./backend, dockerfile: api-gateway/Dockerfile }
    ports: ["3000:3000"]
    environment:
      - SCHOOL_SERVICE_HOST=school-service
      - SCHOOL_SERVICE_PORT=3001
    networks: [lumiqos-network]
    depends_on: [school-service]

  school-service:
    container_name: school-service
    build: { context: ./backend, dockerfile: school-service/Dockerfile }
    networks: [lumiqos-network]
    depends_on: [ai-service]

  ai-service:
    container_name: ai-service
    build: { context: ./backend, dockerfile: ai-service/Dockerfile }
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks: [lumiqos-network]
networks:
  lumiqos-network:
    driver: bridge
